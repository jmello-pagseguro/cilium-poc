apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: app-2-httpbin-only
  namespace: cilium-poc
spec:
  endpointSelector:
    matchLabels:
      app: app-2
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: ANY
        
  - toFQDNs:
    - matchName: "httpbin.org"
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP